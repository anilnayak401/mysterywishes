<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Wishes</title>
    <!-- Automatic redirect for GitHub Pages or similar static hosting -->
    <meta http-equiv="refresh" content="0; url=https://mysterywishes.app">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #FAFAFB;
            color: #FF4DB8;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #FF4DB8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #FF4DB8;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Mystery Wishes</h1>
        <div class="loader"></div>
        <p>Redirecting you to the magical experience...</p>
        <p>If you are not redirected, <a href="https://mysterywishes.app">click here</a>.</p>
    </div>
</body>
</html>
